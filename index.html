<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❤️ تولدت مبارک ساناز ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:linear-gradient(135deg,#ff9ad5,#ffb6e1,#ffd6ec);
min-height:100vh;
overflow-x:hidden;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
max-width:800px;
width:100%;
text-align:center;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
border-radius:30px;
padding:30px;
box-shadow:0 0 30px rgba(255,255,255,.5);
}

h1{
font-size:4rem;
color:white;
text-shadow:
0 0 10px #fff,
0 0 20px #ff69b4,
0 0 40px #ff1493;
animation:pulse 2s infinite;
}

h2{
margin-top:15px;
font-size:2rem;
color:white;
}

.message{
margin-top:25px;
background:rgba(255,255,255,.15);
padding:25px;
border-radius:20px;
color:white;
line-height:2;
font-size:1.2rem;
}

button{
margin-top:25px;
background:#ff1493;
border:none;
padding:15px 35px;
border-radius:40px;
color:white;
font-size:20px;
cursor:pointer;
box-shadow:0 0 20px rgba(255,20,147,.5);
}

button:hover{
transform:scale(1.05);
}

#surprise{
display:none;
margin-top:25px;
font-size:2rem;
color:white;
font-weight:bold;
animation:pulse 1.5s infinite;
}

.heart{
position:fixed;
font-size:25px;
animation:float linear infinite;
opacity:.4;
pointer-events:none;
}

@keyframes float{
from{
transform:translateY(100vh);
}
to{
transform:translateY(-150px);
}
}

@keyframes pulse{
50%{
transform:scale(1.08);
}
}
</style>
</head>

<body>

<audio autoplay loop controls>
<source src="Aref.mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1>❤️ تولدت مبارک ساناز ❤️</h1>

<h2>زیباترین دختر دنیا</h2>

<div class="message">

امروز فقط یک روز معمولی نیست...

امروز روز تولد کسیه که لبخندش می‌تونه
قشنگ‌ترین لحظه‌های زندگی رو بسازه.

<br><br>

ساناز عزیز ❤️

<br><br>

امیدوارم تمام آرزوهای قشنگت
برآورده بشه و همیشه
سلامت، موفق، خوشحال و پرانرژی باشی.

<br><br>

تولدت مبارک عشقم 🎂✨

</div>

<button onclick="showSurprise()">🎁 باز کردن سورپرایز</button>

<div id="surprise">
❤️ دوستت دارم ساناز ❤️
</div>

</div>

<script>

function showSurprise(){
document.getElementById("surprise").style.display="block";
}

for(let i=0;i<50;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"%";

heart.style.animationDuration=
(5+Math.random()*10)+"s";

heart.style.fontSize=
(20+Math.random()*30)+"px";

document.body.appendChild(heart);

}

</script>

</body>
</html>
