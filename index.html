<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❤️ تولدت مبارک ساناز ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
height:100vh;
overflow:hidden;
background:url('bg.png') center center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* لایه تار روی عکس */
body::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,.25);
backdrop-filter:blur(2px);
}

.container{
position:relative;
z-index:2;
width:90%;
max-width:650px;
text-align:center;
color:white;
animation:fadeIn 2s;
}

h1{
font-size:3rem;
margin-bottom:15px;
text-shadow:0 0 20px #ff6b81;
animation:glow 2s infinite alternate;
}

h2{
font-size:1.7rem;
margin-bottom:25px;
color:#ffd6e7;
}

.message{
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
padding:25px;
border-radius:25px;
line-height:2;
font-size:1.2rem;
box-shadow:0 0 30px rgba(255,255,255,.3);
animation:float 4s ease-in-out infinite;
}

/* قلب های متحرک */

.heart{
position:absolute;
color:#ff3b6a;
font-size:25px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-100px);
opacity:0;
}
10%{
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

@keyframes glow{
from{
text-shadow:0 0 10px white,
0 0 20px pink,
0 0 30px red;
}
to{
text-shadow:0 0 20px white,
0 0 40px pink,
0 0 60px red;
}
}

@keyframes float{
50%{
transform:translateY(-10px);
}
}

@keyframes fadeIn{
from{
opacity:0;
transform:scale(.8);
}
to{
opacity:1;
transform:scale(1);
}
}

audio{
position:fixed;
bottom:20px;
left:20px;
z-index:999;
}

</style>
</head>

<body>

<audio autoplay loop controls>
<source src="Aref.mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1>❤️ تولدت مبارک ساناز ❤️</h1>

<h2>زیباترین دختر دنیا</h2>

<div class="message">

امروز فقط یک روز معمولی نیست...

امروز روز تولد کسیه که لبخندش می‌تونه
قشنگ‌ترین لحظه‌های زندگی رو بسازه.

<br><br>

ساناز عزیز،

امیدوارم تمام آرزوهای قشنگت
برآورده بشه و همیشه خوشحال باشی.

✨🎂❤️✨

</div>

</div>

<script>

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"%";

heart.style.animationDuration=
(5+Math.random()*8)+"s";

heart.style.fontSize=
(15+Math.random()*35)+"px";

document.body.appendChild(heart);

}

</script>

</body>
</html>
