<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❤️ تولدت مبارک ساناز ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma,Arial;
}

body{

height:100vh;
overflow:hidden;

background:
linear-gradient(
rgba(255,105,180,.25),
rgba(0,0,0,.35)
),
url('bg.png');

background-size:cover;
background-position:center;

display:flex;
justify-content:center;
align-items:center;

color:white;

}


/* لایه نور */

body:before{

content:"";

position:absolute;

inset:0;

background:
radial-gradient(circle,
rgba(255,255,255,.25),
transparent 40%);

animation:light 5s infinite alternate;

}


@keyframes light{

from{
opacity:.3;
}

to{
opacity:1;
}

}



/* صفحه اصلی */

.container{

position:relative;

z-index:10;

width:90%;

max-width:600px;

text-align:center;

}



/* عنوان */

.title{

font-size:3.5rem;

font-weight:bold;

color:white;

text-shadow:

0 0 10px #fff,

0 0 30px #ff69b4,

0 0 60px #ff1493;

animation:shine 2s infinite alternate;

}


@keyframes shine{

from{

transform:scale(1);

}

to{

transform:scale(1.08);

}

}



/* زیر عنوان */

.subtitle{

font-size:25px;

margin-top:15px;

color:#ffe6f2;

}



/* کارت متن */

.card{

margin-top:35px;

padding:30px;

border-radius:30px;


background:

rgba(255,255,255,.18);


backdrop-filter:blur(15px);


border:

1px solid rgba(255,255,255,.4);


box-shadow:

0 0 40px rgba(255,105,180,.6);


font-size:22px;

line-height:2.2;


animation:

float 4s infinite;

}



@keyframes float{

50%{

transform:translateY(-15px);

}

}



/* دکمه */

.button{

margin-top:30px;

padding:16px 45px;

border:none;

border-radius:50px;

background:

linear-gradient(
45deg,
#ff1493,
#ff69b4
);


color:white;

font-size:22px;

cursor:pointer;


box-shadow:

0 0 30px #ff1493;


transition:.3s;

}


.button:hover{

transform:scale(1.1);

}



/* قلب ها */


.heart{

position:absolute;

top:-50px;

color:#ff4d88;

font-size:25px;

animation:fall linear infinite;

z-index:2;

}


@keyframes fall{


0%{

transform:
translateY(-100px)
rotate(0deg);

opacity:1;

}


100%{

transform:
translateY(110vh)
rotate(360deg);

opacity:0;

}


}



/* ستاره ها */


.star{

position:absolute;

width:5px;

height:5px;

background:white;

border-radius:50%;

box-shadow:

0 0 15px white;


animation:twinkle 2s infinite;

}



@keyframes twinkle{

50%{

opacity:.2;

transform:scale(2);

}

}



/* موزیک */

audio{

position:fixed;

bottom:15px;

left:15px;

z-index:100;

width:250px;

}


</style>

</head>
