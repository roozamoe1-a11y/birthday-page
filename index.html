<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❤️ تولدت مبارک ساناز ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
background:url('bg.png') center center/cover no-repeat;
height:100vh;
overflow:hidden;
position:relative;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(2px);
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:700px;
text-align:center;
z-index:10;
}

.title{
font-size:65px;
color:white;
font-weight:bold;
text-shadow:
0 0 10px #fff,
0 0 20px #ff4d6d,
0 0 40px #ff4d6d;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
text-shadow:
0 0 10px #fff,
0 0 20px #ff4d6d,
0 0 40px #ff4d6d;
}
to{
text-shadow:
0 0 20px #fff,
0 0 40px #ff4d6d,
0 0 80px #ff4d6d;
}
}

.subtitle{
margin-top:20px;
font-size:28px;
color:#fff;
font-weight:bold;
}

.card{
margin-top:30px;
background:rgba(255,255,255,0.15);
border:1px solid rgba(255,255,255,0.3);
backdrop-filter:blur(12px);
border-radius:30px;
padding:30px;
color:white;
line-height:2;
font-size:24px;
box-shadow:0 0 30px rgba(255,255,255,0.3);
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-12px);}
100%{transform:translateY(0);}
}

.btn{
margin-top:25px;
padding:15px 40px;
font-size:20px;
border:none;
border-radius:50px;
cursor:pointer;
background:#ff4d6d;
color:white;
box-shadow:0 0 20px #ff4d6d;
}

.heart{
position:absolute;
color:red;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-100px);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

.sparkle{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:blink 2s infinite;
}

@keyframes blink{
0%,100%{
opacity:0;
}
50%{
opacity:1;
box-shadow:0 0 20px white;
}
}

</style>
</head>

<body>

<div class="overlay"></div>

<audio autoplay loop>
<source src="Aref.mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1 class="title">❤️ تولدت مبارک ساناز ❤️</h1>

<div class="subtitle">
زیباترین دختر دنیا
</div>

<div class="card">

امروز تولد کسیه که<br>

یه روزی بخش مهمی از دنیام بود...<br>

با همه فاصله‌ها و سکوت‌ها<br>

براش بهترین‌ها رو آرزو می‌کنم ❤️<br><br>

تولدت مبارک ساناز عزیز 🎂✨<br>

امیدوارم همیشه بخندی<br>

و تمام آرزوهای قشنگت برآورده بشه 🌹

</div>

<button class="btn" onclick="document.querySelector('audio').play()">
🎵 پخش موزیک
</button>

</div>
<script>

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"%";

heart.style.fontSize=(20+Math.random()*40)+"px";

heart.style.animationDuration=
(5+Math.random()*8)+"s";

document.body.appendChild(heart);

}

for(let i=0;i<80;i++){

let star=document.createElement("div");

star.className="sparkle";

star.style.left=Math.random()*100+"%";

star.style.top=Math.random()*100+"%";

star.style.animationDelay=
Math.random()*3+"s";

document.body.appendChild(star);

}

</script>

</body>
</html>
