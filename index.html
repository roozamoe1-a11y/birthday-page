<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تولدت مبارک ساناز ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Vazirmatn',sans-serif;
}

body{
background:linear-gradient(135deg,#ff9ecf,#ffc6e5,#ffd8ee);
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
text-align:center;
padding:30px;
z-index:2;
}

h1{
font-size:4rem;
color:white;
text-shadow:0 0 20px rgba(255,255,255,.8);
margin-bottom:15px;
animation:glow 2s infinite alternate;
}

h2{
font-size:2rem;
color:white;
margin-bottom:25px;
}

.message{
max-width:700px;
background:rgba(255,255,255,.2);
backdrop-filter:blur(10px);
padding:25px;
border-radius:25px;
color:white;
font-size:1.3rem;
line-height:2;
box-shadow:0 0 30px rgba(255,255,255,.3);
}

.btn{
margin-top:30px;
padding:15px 35px;
font-size:1.1rem;
border:none;
border-radius:50px;
background:white;
color:#ff4f9a;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(1.1);
}

.heart{
position:absolute;
color:#fff;
font-size:25px;
animation:float linear infinite;
opacity:.8;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
10%{
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

@keyframes glow{
from{
text-shadow:0 0 10px white;
}
to{
text-shadow:0 0 30px white,0 0 60px pink;
}
}

.cake{
font-size:90px;
margin-bottom:20px;
animation:bounce 2s infinite;
}

@keyframes bounce{
50%{
transform:translateY(-15px);
}
}

#surprise{
display:none;
margin-top:25px;
font-size:1.5rem;
color:white;
font-weight:bold;
}
</style>
</head>

<body>

<audio autoplay loop controls style="position:fixed;bottom:10px;left:10px;z-index:10">
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">

<div class="cake">🎂</div>

<h1>تولدت مبارک ساناز ❤️</h1>

<h2>زیباترین دختر دنیا</h2>

<div class="message">
امروز فقط یک روز معمولی نیست...
امروز روز تولد کسیه که لبخندش می‌تونه
قشنگ‌ترین لحظه‌های زندگی رو بسازه.

ساناز عزیز،
امیدوارم تمام آرزوهای قشنگت برآورده بشه
و همیشه خوشحال، موفق و دوست‌داشتنی بمونی.

تولدت مبارک 🌹💕
</div>

<button class="btn" onclick="showMessage()">
کلیک کن ❤️
</button>

<div id="surprise">
دوستت دارم ساناز 🌹💖
</div>

</div>

<script>

function showMessage(){
document.getElementById("surprise").style.display="block";
}

for(let i=0;i<60;i++){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(15+Math.random()*35)+"px";

heart.style.animationDuration=(5+Math.random()*10)+"s";

document.body.appendChild(heart);
}

</script>

</body>
</html>
